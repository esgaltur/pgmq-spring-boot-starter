name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and run integration tests
      # Testcontainers relies on Docker, which is pre-installed on the ubuntu-latest runner.
      # We use 'verify' instead of 'test' to ensure the JaCoCo coverage report is generated.
      run: mvn clean verify -B

    - name: Upload JaCoCo Coverage Report
      uses: actions/upload-artifact@v4
      if: always() # Always upload the report even if some tests fail
      with:
        name: jacoco-coverage-report
        path: target/site/jacoco/
        retention-days: 7
